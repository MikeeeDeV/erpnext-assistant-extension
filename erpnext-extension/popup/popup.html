<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ERPNext Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --green: #36B54A;
    --blue: #27ADE1;
    --green-light: #e8f8eb;
    --blue-light: #e6f6fd;
    --green-mid: #c2edca;
    --bg: #f7f9f7;
    --card: #ffffff;
    --text: #1a2e1c;
    --text-soft: #5a7a5e;
    --border: #e2ede3;
    --shadow: 0 2px 12px rgba(54,181,74,0.10);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 360px;
    min-height: 480px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #fff 60%, var(--green-light));
    border-bottom: 1.5px solid var(--border);
    padding: 16px 18px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }
  .header-logo {
    width: 36px;
    height: 40px;
    flex-shrink: 0;
  }
  .header-title {
    flex: 1;
  }
  .header-title h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header-title p {
    font-size: 11px;
    color: var(--text-soft);
    margin-top: 1px;
  }
  .header-sidepanel-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-soft);
    transition: all 0.2s;
  }
  .header-sidepanel-btn:hover {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }

  /* Status bar */
  .status-bar {
    padding: 8px 18px;
    background: var(--green-light);
    border-bottom: 1px solid var(--green-mid);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11.5px;
    color: var(--green);
    font-weight: 500;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-bar.inactive {
    background: #f5f5f5;
    border-color: #e0e0e0;
    color: #999;
  }
  .status-bar.inactive .status-dot { background: #bbb; animation: none; }

  /* Quick actions */
  .section { padding: 14px 18px 0; }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 10px;
  }

  .quick-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .quick-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'DM Sans', sans-serif;
  }
  .quick-btn:hover {
    background: var(--green-light);
    border-color: var(--green);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(54,181,74,0.15);
  }
  .quick-btn .icon {
    font-size: 20px;
  }
  .quick-btn span {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    line-height: 1.2;
  }
  .quick-btn.blue:hover {
    background: var(--blue-light);
    border-color: var(--blue);
    box-shadow: 0 4px 12px rgba(39,173,225,0.15);
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .stat-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 10px 8px;
    text-align: center;
  }
  .stat-card .val {
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
    font-family: 'DM Mono', monospace;
    line-height: 1;
  }
  .stat-card.blue .val { color: var(--blue); }
  .stat-card .lbl {
    font-size: 9.5px;
    color: var(--text-soft);
    margin-top: 3px;
    font-weight: 500;
  }

  /* Recent activity */
  .activity-list { margin-bottom: 6px; }
  .activity-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .activity-dot.green { background: var(--green); }
  .activity-dot.blue { background: var(--blue); }
  .activity-dot.orange { background: #f59e0b; }
  .activity-text {
    flex: 1;
    font-size: 11.5px;
    color: var(--text);
    font-weight: 500;
  }
  .activity-time {
    font-size: 10px;
    color: var(--text-soft);
    font-family: 'DM Mono', monospace;
  }

  /* Footer */
  .footer {
    padding: 10px 18px 14px;
    display: flex;
    gap: 8px;
  }
  .footer-btn {
    flex: 1;
    padding: 9px;
    border-radius: 9px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--text);
  }
  .footer-btn.primary {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .footer-btn.primary:hover {
    background: #2da042;
    box-shadow: 0 3px 10px rgba(54,181,74,0.3);
  }
  .footer-btn:not(.primary):hover {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }

  #not-erpnext {
    padding: 32px 18px;
    text-align: center;
    display: none;
  }
  #not-erpnext .big-icon { font-size: 40px; margin-bottom: 12px; }
  #not-erpnext h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  #not-erpnext p { font-size: 12px; color: var(--text-soft); line-height: 1.5; }

  #erpnext-ui { display: block; }
</style>
</head>

<!-- Not ERPNext notice -->
<div id="not-erpnext">
  <div class="big-icon">🔍</div>
  <h3>Not on ERPNext</h3>
  <p>Navigate to your ERPNext instance to use the assistant.</p>
</div>

<!-- Main ERPNext UI -->
<div id="erpnext-ui">
  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">Connected to ERPNext</span>
  </div>

  <!-- Quick Actions -->
  <div class="section">
    <div class="section-label">Quick Actions</div>
    <div class="quick-grid">
      <button class="quick-btn" data-action="new-invoice">
        <span class="icon">🧾</span>
        <span>New Invoice</span>
      </button>
      <button class="quick-btn" data-action="new-order">
        <span class="icon">📦</span>
        <span>Sales Order</span>
      </button>
      <button class="quick-btn" data-action="new-purchase">
        <span class="icon">🛒</span>
        <span>Purchase</span>
      </button>
      <button class="quick-btn blue" data-action="chart">
        <span class="icon">📊</span>
        <span>Chart View</span>
      </button>
      <button class="quick-btn blue" data-action="export">
        <span class="icon">⬇️</span>
        <span>Export CSV</span>
      </button>
      <button class="quick-btn blue" data-action="export-xlsx">
        <span class="icon">📋</span>
        <span>Export XLSX</span>
      </button>
    </div>
  </div>

  <!-- Live Stats -->
  <div class="section">
    <div class="section-label">Live Stats</div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="val" id="stat1">—</div>
